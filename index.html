<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/gif" href="content/200.gif">
    <title data-header="page-title">Loading...</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .portfolio-choice-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .portfolio-choice {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 350px;
            box-shadow: var(--card-shadow);
            text-decoration: none;
            color: var(--text-primary);
        }

        .portfolio-choice:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .portfolio-image {
            position: relative;
            width: 100%;
            height: 0;
            padding-top: 56.25%;
            /* 16:9 aspect ratio */
            background-color: #000;
            overflow: hidden;
        }

        .portfolio-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-choice:hover .portfolio-image img {
            transform: scale(1.05);
        }

        .portfolio-info {
            padding: 1.5rem;
            text-align: center;
        }

        .portfolio-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .portfolio-info p {
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .portfolio-3d-card {
            --accent-color: #ff6b6b;
        }

        .portfolio-3d-card .portfolio-info h3 {
            color: #ff6b6b;
        }

        .portfolio-programming-card {
            --accent-color: #4a90e2;
        }

        .portfolio-programming-card .portfolio-info h3 {
            color: #4a90e2;
        }

        .portfolio-gamedev-card {
            --accent-color: #2ecc71;
        }

        .portfolio-gamedev-card .portfolio-info h3 {
            color: #2ecc71;
        }
    </style>
</head>

<body>
    <!-- Add theme toggle button -->
    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Social ribbon will be inserted here by the script -->

    <header>
        <div class="header-content">
            <div id="name-display" class="dynamic-name-container">
                <div class="name-indicator">Full name</div>
                <h1>Ubeid Hussein<span class="cursor"></span></h1>
            </div>
            <p class="subtitle" data-header="subtitle"></p>
            <div class="bio">
                <p class="bio-nonfull" data-header="bio-nonfull"></p>
                <p class="bio-full" data-header="bio-full"></p>
            </div>
        </div>
    </header>

    <main>
        <div class="section-divider">
            <h2 data-header="section-title"></h2>
            <p data-header="section-desc"></p>
        </div>

        <div class="portfolio-choice-container">
            <a href="programming-portfolio.html" class="portfolio-choice portfolio-programming-card">
                <div class="portfolio-image">
                    <img src="images/MMP.png" alt="Programming Portfolio">
                </div>
                <div class="portfolio-info">
                    <h3 data-header="programming-title"></h3>
                    <p data-header="programming-desc"></p>
                </div>
            </a>

            <a href="3d-portfolio.html" class="portfolio-choice portfolio-3d-card">
                <div class="portfolio-image">
                    <img src="images/Ballgen.jpg" alt="3D Portfolio">
                </div>
                <div class="portfolio-info">
                    <h3 data-header="3d-title"></h3>
                    <p data-header="3d-desc"></p>
                </div>
            </a>

            <a href="gamedev-portfolio.html" class="portfolio-choice portfolio-gamedev-card">
                <div class="portfolio-image">
                    <img src="images/Timble.png" alt="Game Development Portfolio">
                </div>
                <div class="portfolio-info">
                    <h3 data-header="gamedev-title"></h3>
                    <p data-header="gamedev-desc"></p>
                </div>
            </a>
        </div>
    </main>

    <!-- Load shared social ribbon script -->
    <script src="scripts/social-ribbon.js"></script>
    <script src="scripts/load-headers.js"></script>
    <script src="scripts/portfolio-common.js"></script>

    <script>
        if (new URLSearchParams(window.location.search).has('page')) {
            document.querySelectorAll('.portfolio-choice').forEach(function(link) {
                var existing = new URLSearchParams(link.search);
                new URLSearchParams(window.location.search).forEach(function(value, key) {
                    existing.set(key, value);
                });
                link.search = existing.toString();
            });
        }

        // Swap portfolio card images when ?page=full is active
        const pageParam = new URLSearchParams(window.location.search).get('page');
        if (pageParam === 'full') {
            const progImg = document.querySelector('.portfolio-programming-card .portfolio-image img');
            const tdImg = document.querySelector('.portfolio-3d-card .portfolio-image img');
            if (progImg) progImg.src = 'images/COACD.png';
            if (tdImg) tdImg.src = 'images/MansionInterior.jpg';
        }
    </script>
    <div id="footer-container"></div>
    <script>
        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                const container = document.getElementById('footer-container');
                container.innerHTML = html;
                container.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            })
            .catch(error => console.error('Failed to load footer:', error));
    </script>
</body>

</html>
